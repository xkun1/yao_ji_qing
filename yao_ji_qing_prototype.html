<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药记清 - AI 智能药管家原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang SC', sans-serif; background-color: #f3f4f6; }
        .phone-container { width: 375px; height: 812px; background: white; border: 12px solid #1f2937; border-radius: 40px; position: relative; overflow: hidden; margin: 20px auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #f9fafb; }
        .active-screen { display: flex; }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 20%; } 100% { top: 70%; } }
        .btn-shadow { box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39); }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- 1. 首页 (Dashboard) -->
    <div id="home-screen" class="screen active-screen">
        <div class="p-6 pt-12">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-gray-500 text-sm">早安，坤嫂</h2>
                    <p class="text-xl font-bold text-gray-800">今天状态不错！☀️</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <!-- 进度卡片 -->
            <div class="bg-blue-600 rounded-3xl p-6 text-white mb-8 btn-shadow">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-blue-100 text-sm">今日用药进度</p>
                        <h3 class="text-3xl font-bold mt-1">2 / 5</h3>
                        <p class="text-xs text-blue-200 mt-2">还差 3 次，加油哦！</p>
                    </div>
                    <div class="relative w-20 h-20">
                        <svg class="w-20 h-20 transform -rotate-90">
                            <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="8" fill="transparent" class="text-blue-500" />
                            <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="213" stroke-dashoffset="85" class="text-white" />
                        </svg>
                        <span class="absolute inset-0 flex items-center justify-center font-bold">60%</span>
                    </div>
                </div>
            </div>

            <!-- 待办列表 -->
            <h4 class="font-bold text-gray-800 mb-4">接下来该吃：</h4>
            <div class="space-y-4">
                <div class="bg-white border border-gray-100 rounded-2xl p-4 flex items-center shadow-sm">
                    <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600 mr-4">
                        <i class="fa-solid fa-pills text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-gray-800 text-sm">阿莫西林胶囊</p>
                        <p class="text-xs text-gray-500">12:30 | 饭后 2 粒</p>
                    </div>
                    <button class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition">吃好了</button>
                </div>

                <div class="bg-white border border-gray-100 rounded-2xl p-4 flex items-center shadow-sm opacity-50">
                    <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center text-green-600 mr-4">
                        <i class="fa-solid fa-check text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-gray-800 text-sm">维生素 C</p>
                        <p class="text-xs text-gray-500">08:00 | 已打卡</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="mt-auto bg-white border-t border-gray-100 p-4 flex justify-around items-center pb-8">
            <i class="fa-solid fa-house text-blue-600 text-xl"></i>
            <div onclick="showScreen('scan-screen')" class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl -mt-12 border-4 border-white btn-shadow cursor-pointer">
                <i class="fa-solid fa-plus"></i>
            </div>
            <i class="fa-solid fa-chart-simple text-gray-300 text-xl"></i>
        </div>
    </div>

    <!-- 2. AI 扫描页 (Scan) -->
    <div id="scan-screen" class="screen bg-black">
        <div class="relative flex-1 flex flex-col items-center justify-center">
            <div class="absolute top-12 left-6 text-white" onclick="showScreen('home-screen')">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </div>
            
            <!-- 扫描框 -->
            <div class="w-64 h-80 border-2 border-white rounded-3xl relative overflow-hidden">
                <div class="scan-line absolute w-full top-1/4"></div>
                <div class="absolute inset-0 bg-blue-500 opacity-10"></div>
                <img src="https://img.freepik.com/free-photo/doctor-writing-prescription-close-up_23-2149184511.jpg" class="w-full h-full object-cover opacity-60" alt="prescription">
            </div>
            
            <p class="text-white mt-8 font-medium">正在识别医嘱文本...</p>
            
            <div class="mt-20 flex space-y-4 flex-col items-center">
                <button onclick="showScreen('result-screen')" class="w-16 h-16 rounded-full border-4 border-white p-1">
                    <div class="w-full h-full bg-white rounded-full"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- 3. 结果确认页 (Result) -->
    <div id="result-screen" class="screen">
        <div class="p-6 pt-12">
            <div class="flex items-center mb-6">
                <i class="fa-solid fa-chevron-left text-gray-400 mr-4" onclick="showScreen('scan-screen')"></i>
                <h2 class="text-xl font-bold text-gray-800">AI 识别结果</h2>
            </div>

            <div class="bg-green-50 border border-green-100 rounded-2xl p-4 mb-6 flex items-center">
                <i class="fa-solid fa-circle-check text-green-500 mr-3 text-xl"></i>
                <p class="text-green-800 text-sm font-medium">太棒了！AI 已成功解析医嘱。</p>
            </div>

            <!-- 结构化卡片 -->
            <div class="space-y-6">
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">药名</label>
                    <p class="text-lg font-bold text-gray-800 mt-1">阿莫西林胶囊 (Amoxicillin)</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">每次剂量</label>
                        <p class="text-lg font-bold text-blue-600 mt-1">2 粒</p>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">每日频次</label>
                        <p class="text-lg font-bold text-blue-600 mt-1">3 次</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">服用时间</label>
                    <div class="flex space-x-2 mt-2">
                        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold">早</span>
                        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold">中</span>
                        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold">晚</span>
                    </div>
                    <p class="text-sm text-gray-600 mt-3 font-medium">💡 建议饭后 30 分钟服用</p>
                </div>

                <div class="bg-orange-50 rounded-2xl p-5 border border-orange-100">
                    <label class="text-xs text-orange-400 font-bold uppercase tracking-wider">注意事项</label>
                    <p class="text-sm text-orange-800 mt-1 font-medium">⚠️ 服药期间请勿饮酒，忌辛辣刺激食物。</p>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="showScreen('home-screen')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold btn-shadow">确定，并开启提醒</button>
                <button class="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold">手动修正</button>
            </div>
        </div>
    </div>
</div>

<div class="text-center mt-4 text-gray-400 text-sm">
    <p>💡 提示：点击 [+] 模拟拍照，点击拍照按钮模拟 AI 识别</p>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }
</script>

</body>
</html>
