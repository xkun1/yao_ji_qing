name: yao_ji_qing
description: "AI 智能药管家 - 拍一张医嘱，AI 替你记。"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  device_info_plus: ^10.1.0

  # AI & 网络
  google_generative_ai: ^0.4.0
  flutter_gemma: ^0.14.5
  background_downloader: ^9.5.4
  dio: ^5.4.1
  http: ^1.2.1

  # 本地化 & 提醒
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  intl: ^0.20.2

  # 拍照 & 图片选择
  camera: ^0.11.0+2
  image_picker: ^1.0.7

  # 动画 & UI
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.6
  permission_handler: ^12.0.1
  sherpa_onnx: ^1.12.39
  audioplayers: ^6.6.0
  provider: ^6.1.5+1
  google_mlkit_text_recognition: ^0.15.1
  flutter_markdown_plus: ^1.0.7
  share_plus: ^10.1.4
  sentry_flutter: ^8.14.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_native_splash: ^2.4.0
  
  # 代码生成
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon_1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  android_12:
    color: "#FFFFFF"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
